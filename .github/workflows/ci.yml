name: CI - payment-service

on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]
        
jobs:
    build:
        runs-on: ubuntu-24.04
        
        steps:
            - name: Checkout code
              uses: actions/checkout@v4
              
            - name: Set up Java 21
              uses: actions/setup-java@v4
              with:
                java-version: '21'
                distribution: 'temurin'
                cache: maven
             
            - name: Build and test
              run: mvn verify
              
            - name: Build Docker image
              uses: docker/build-push-action@v5
              with:
                context: .
                push: false
                tags: payment-service:${{ github.sha }}